name: Scrape listings & deploy

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 8am UTC (4am ET)
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  # ── Job 1: Scrape + photos + deploy ───────────────────
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # max GitHub allows — full photo enrichment

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scrapers
        run: python run_scrapers.py --photos --merge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated listings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/listings.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update listings $(date -u '+%Y-%m-%d')"
          git push

  # Deploy is handled by .github/workflows/deploy.yml
  # It triggers automatically on every push to main (except data-only commits)
