<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cincinnati Real Estate — All Listings</title>

  <!-- Leaflet map (free, open-source) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🏠</span>
      <span class="logo-text">CincyListings</span>
      <span class="logo-sub">Zillow · Redfin · Sibcy Cline · Comey · Huff · CincyMLS · CincinKY · Coldwell Banker</span>
    </div>
    <div class="header-meta" id="header-meta">Loading…</div>
  </div>
</header>

<!-- ── MAIN LAYOUT ───────────────────────────────────── -->
<div class="layout">

  <!-- LEFT: Filters -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Filters</h2>
      <button class="btn-ghost" id="clear-filters">Clear all</button>
    </div>

    <!-- Search -->
    <div class="filter-group">
      <label class="filter-label">Search</label>
      <input type="text" id="filter-search" placeholder="e.g. updated kitchen, new roof, pool…" />
    </div>

    <!-- Features -->
    <div class="filter-group">
      <label class="filter-label">Features</label>
      <div class="chip-group chip-group-wrap" id="filter-features">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="updated_kitchen">Updated Kitchen</button>
        <button class="chip" data-val="open_floor_plan">Open Floor Plan</button>
        <button class="chip" data-val="hardwood_floors">Hardwood Floors</button>
        <button class="chip" data-val="quartz_counters">Quartz</button>
        <button class="chip" data-val="granite_counters">Granite</button>
        <button class="chip" data-val="new_appliances">New Appliances</button>
        <button class="chip" data-val="pool">Pool</button>
        <button class="chip" data-val="finished_basement">Finished Basement</button>
        <button class="chip" data-val="new_roof">New Roof</button>
        <button class="chip" data-val="new_hvac">New HVAC</button>
        <button class="chip" data-val="fireplace">Fireplace</button>
        <button class="chip" data-val="master_suite">Master Suite</button>
        <button class="chip" data-val="walk_in_closet">Walk-in Closet</button>
        <button class="chip" data-val="fenced_yard">Fenced Yard</button>
        <button class="chip" data-val="deck_patio">Deck / Patio</button>
        <button class="chip" data-val="two_car_garage">2-Car Garage</button>
        <button class="chip" data-val="in_law_suite">In-Law Suite</button>
        <button class="chip" data-val="move_in_ready">Move-in Ready</button>
        <button class="chip" data-val="needs_work">Needs Work</button>
        <button class="chip" data-val="new_construction">New Construction</button>
        <button class="chip" data-val="smart_home">Smart Home</button>
      </div>
    </div>

    <!-- Price -->
    <div class="filter-group">
      <label class="filter-label">Price</label>
      <div class="range-row">
        <div class="range-col">
          <span class="range-hint">Min</span>
          <select id="filter-price-min">
            <option value="">Any</option>
            <option value="50000">$50k</option>
            <option value="100000">$100k</option>
            <option value="150000">$150k</option>
            <option value="200000">$200k</option>
            <option value="250000">$250k</option>
            <option value="300000">$300k</option>
            <option value="400000">$400k</option>
            <option value="500000">$500k</option>
            <option value="750000">$750k</option>
            <option value="900000">$900k</option>
            <option value="1000000">$1M+</option>
          </select>
        </div>
        <span class="range-dash">–</span>
        <div class="range-col">
          <span class="range-hint">Max</span>
          <select id="filter-price-max">
            <option value="">Any</option>
            <option value="100000">$100k</option>
            <option value="150000">$150k</option>
            <option value="200000">$200k</option>
            <option value="250000">$250k</option>
            <option value="300000">$300k</option>
            <option value="400000">$400k</option>
            <option value="500000">$500k</option>
            <option value="750000">$750k</option>
            <option value="900000">$900k</option>
            <option value="1000000">$1M+</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Beds -->
    <div class="filter-group">
      <label class="filter-label">Bedrooms</label>
      <div class="chip-group" id="filter-beds">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="1">1+</button>
        <button class="chip" data-val="2">2+</button>
        <button class="chip" data-val="3">3+</button>
        <button class="chip" data-val="4">4+</button>
        <button class="chip" data-val="5">5+</button>
      </div>
    </div>

    <!-- Baths -->
    <div class="filter-group">
      <label class="filter-label">Bathrooms</label>
      <div class="chip-group" id="filter-baths">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="1">1+</button>
        <button class="chip" data-val="2">2+</button>
        <button class="chip" data-val="3">3+</button>
      </div>
    </div>

    <!-- Property Type -->
    <div class="filter-group">
      <label class="filter-label">Property Type</label>
      <div class="chip-group" id="filter-type">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="SINGLE_FAMILY">House</button>
        <button class="chip" data-val="CONDO">Condo</button>
        <button class="chip" data-val="TOWNHOUSE">Townhouse</button>
        <button class="chip" data-val="MULTI_FAMILY">Multi-family</button>
      </div>
    </div>

    <!-- Zip Code -->
    <div class="filter-group">
      <label class="filter-label">ZIP Code</label>
      <input type="text" id="filter-zip" placeholder="e.g. 45202" maxlength="5" />
    </div>

    <!-- Area -->
    <div class="filter-group">
      <label class="filter-label">Area</label>
      <div class="chip-group" id="filter-area">
        <button class="chip active" data-val="">All</button>
        <button class="chip" data-val="OH">Cincinnati (OH)</button>
        <button class="chip" data-val="KY">KY Neighbors</button>
      </div>
    </div>

    <!-- Source -->
    <div class="filter-group">
      <label class="filter-label">Source</label>
      <div class="chip-group" id="filter-source">
        <button class="chip active" data-val="">All</button>
        <button class="chip" data-val="zillow">Zillow</button>
        <button class="chip" data-val="redfin">Redfin</button>
        <button class="chip" data-val="sibcy_cline">Sibcy Cline</button>
        <button class="chip" data-val="comey">Comey</button>
        <button class="chip" data-val="huff">Huff</button>
        <button class="chip" data-val="listings_cincinnati">CincyMLS</button>
        <button class="chip" data-val="cincinky">CincinKY</button>
        <button class="chip" data-val="coldwell_banker">Coldwell Banker</button>
      </div>
    </div>

    <!-- Room Filter -->
    <div class="filter-group">
      <label class="filter-label">Room Type (AI)</label>
      <div class="chip-group" id="filter-room-type">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="kitchen">Kitchen</button>
        <button class="chip" data-val="master_bathroom">Master Bath</button>
        <button class="chip" data-val="bathroom">Bathroom</button>
        <button class="chip" data-val="living_room">Living Room</button>
        <button class="chip" data-val="master_bedroom">Master Bed</button>
        <button class="chip" data-val="bedroom">Bedroom</button>
        <button class="chip" data-val="backyard">Backyard</button>
        <button class="chip" data-val="exterior">Exterior</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Room — Modernity</label>
      <div class="chip-group" id="filter-room-modernity">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Updated+</button>
        <button class="chip" data-val="7">Modern+</button>
        <button class="chip" data-val="9">Ultra-Modern</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Room — Luxury</label>
      <div class="chip-group" id="filter-room-luxury">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Quality+</button>
        <button class="chip" data-val="7">Upscale+</button>
        <button class="chip" data-val="9">Luxury</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Room — Condition</label>
      <div class="chip-group" id="filter-room-condition">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Good+</button>
        <button class="chip" data-val="7">Great+</button>
        <button class="chip" data-val="9">Pristine</button>
      </div>
    </div>

    <!-- AI Scores -->
    <div class="filter-group">
      <label class="filter-label">Cincinnatus AI — Overall</label>
      <div class="chip-group" id="filter-ai-score">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Good+</button>
        <button class="chip" data-val="7">Very Good+</button>
        <button class="chip" data-val="9">Excellent</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Modernity</label>
      <div class="chip-group" id="filter-ai-modernity">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Updated+</button>
        <button class="chip" data-val="7">Modern+</button>
        <button class="chip" data-val="9">Ultra-Modern</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Luxury</label>
      <div class="chip-group" id="filter-ai-luxury">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Quality+</button>
        <button class="chip" data-val="7">Upscale+</button>
        <button class="chip" data-val="9">Luxury</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Condition</label>
      <div class="chip-group" id="filter-ai-condition">
        <button class="chip active" data-val="">Any</button>
        <button class="chip" data-val="5">Good+</button>
        <button class="chip" data-val="7">Great+</button>
        <button class="chip" data-val="9">Pristine</button>
      </div>
    </div>

    <!-- Sort -->
    <div class="filter-group">
      <label class="filter-label">Sort by</label>
      <select id="filter-sort">
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
        <option value="beds_desc">Most Beds</option>
        <option value="sqft_desc">Largest</option>
        <option value="dom_asc">Newest</option>
        <option value="ai_score_desc">AI Score: Best First</option>
      </select>
    </div>

    <div class="result-count" id="result-count">— listings</div>
  </aside>

  <!-- CENTER: Results + Map -->
  <main class="main-content">

    <!-- Tab bar: List / Map -->
    <div class="view-tabs">
      <button class="tab active" id="tab-list">List view</button>
      <button class="tab" id="tab-map">Map view</button>
      <button class="tab" id="tab-photos">📷 Photos</button>
      <div class="mobile-filter-toggle" id="mobile-filter-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
        Filters
      </div>
    </div>

    <!-- List view -->
    <div id="view-list">
      <div id="listings-grid" class="listings-grid"></div>
      <div id="load-more-wrap" class="load-more-wrap" style="display:none">
        <button class="btn-load-more" id="load-more">Load more</button>
      </div>
    </div>

    <!-- Map view -->
    <div id="view-map" style="display:none">
      <div id="map"></div>
    </div>

    <!-- Photos view -->
    <div id="view-photos" style="display:none">
      <div class="photos-header" id="photos-count"></div>
      <div id="photos-grid" class="photos-grid"></div>
    </div>

  </main>
</div>

<!-- ── LISTING DETAIL MODAL ──────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
